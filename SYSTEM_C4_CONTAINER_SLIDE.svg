<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .section { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .label { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .tiny { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .actor { fill: #dbeafe; stroke: #2563eb; stroke-width: 2.2; }
      .container { fill: #dcfce7; stroke: #16a34a; stroke-width: 2.2; }
      .store { fill: #ffedd5; stroke: #ea580c; stroke-width: 2.2; }
      .external { fill: #f3e8ff; stroke: #7c3aed; stroke-width: 2.2; }
      .boundary { fill: rgba(255,255,255,0.56); stroke: #94a3b8; stroke-width: 2.4; stroke-dasharray: 10 8; }
      .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 8 6; }
      .shadow { filter: drop-shadow(0 8px 18px rgba(15, 23, 42, 0.11)); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569" />
    </marker>
    <linearGradient id="head" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="1080" />
  <rect x="0" y="0" width="1920" height="104" fill="url(#head)" />
  <text class="title" x="52" y="52">DTPShop - C4 Container Diagram</text>
  <text class="subtitle" x="52" y="84">Phiên bản slide 16:9, tối giản và dễ đưa vào báo cáo</text>

  <text class="section" x="52" y="146">Actors</text>
  <rect class="actor shadow" x="44" y="182" rx="18" ry="18" width="170" height="76" />
  <text class="label" x="129" y="216" text-anchor="middle">Customer</text>
  <text class="small" x="129" y="239" text-anchor="middle">Browser</text>

  <rect class="actor shadow" x="44" y="280" rx="18" ry="18" width="170" height="76" />
  <text class="label" x="129" y="314" text-anchor="middle">Admin</text>
  <text class="small" x="129" y="337" text-anchor="middle">Browser</text>

  <rect class="boundary" x="250" y="150" rx="30" ry="30" width="1400" height="720" />
  <text class="section" x="284" y="186">DTPShop System Boundary</text>

  <rect class="container shadow" x="330" y="220" rx="18" ry="18" width="250" height="92" />
  <text class="label" x="455" y="256" text-anchor="middle">Frontend React</text>
  <text class="small" x="455" y="280" text-anchor="middle">Vite app :5173</text>

  <rect class="container shadow" x="660" y="220" rx="18" ry="18" width="250" height="92" />
  <text class="label" x="785" y="256" text-anchor="middle">API Gateway</text>
  <text class="small" x="785" y="280" text-anchor="middle">Node.js :8080</text>

  <rect class="container shadow" x="1010" y="220" rx="18" ry="18" width="210" height="92" />
  <text class="label" x="1115" y="256" text-anchor="middle">auth-service</text>
  <text class="small" x="1115" y="280" text-anchor="middle">JWT / OTP / Redis</text>

  <rect class="container shadow" x="1260" y="220" rx="18" ry="18" width="210" height="92" />
  <text class="label" x="1365" y="256" text-anchor="middle">user-service</text>
  <text class="small" x="1365" y="280" text-anchor="middle">Profile / Admin</text>

  <rect class="container shadow" x="330" y="356" rx="18" ry="18" width="250" height="92" />
  <text class="label" x="455" y="392" text-anchor="middle">product-service</text>
  <text class="small" x="455" y="416" text-anchor="middle">Catalog / S3 upload</text>

  <rect class="container shadow" x="660" y="356" rx="18" ry="18" width="250" height="92" />
  <text class="label" x="785" y="392" text-anchor="middle">order-service</text>
  <text class="small" x="785" y="416" text-anchor="middle">Cart / Orders / MQ</text>

  <rect class="container shadow" x="1010" y="356" rx="18" ry="18" width="210" height="92" />
  <text class="label" x="1115" y="392" text-anchor="middle">payment-service</text>
  <text class="small" x="1115" y="416" text-anchor="middle">MoMo integration</text>

  <rect class="container shadow" x="1260" y="356" rx="18" ry="18" width="210" height="92" />
  <text class="label" x="1365" y="392" text-anchor="middle">ai-service</text>
  <text class="small" x="1365" y="416" text-anchor="middle">Gemini assistant</text>

  <rect class="container shadow" x="660" y="492" rx="18" ry="18" width="250" height="92" />
  <text class="label" x="785" y="528" text-anchor="middle">chat-service</text>
  <text class="small" x="785" y="552" text-anchor="middle">Socket.io / uploads</text>

  <rect class="store shadow" x="300" y="638" rx="18" ry="18" width="290" height="110" />
  <text class="label" x="445" y="676" text-anchor="middle">AWS RDS MySQL</text>
  <text class="small" x="445" y="702" text-anchor="middle">authdb, userdb, productdb</text>
  <text class="small" x="445" y="724" text-anchor="middle">orderdb, paymentdb</text>

  <rect class="store shadow" x="630" y="638" rx="18" ry="18" width="220" height="110" />
  <text class="label" x="740" y="676" text-anchor="middle">Redis shared</text>
  <text class="small" x="740" y="702" text-anchor="middle">OTP / token / cart</text>
  <text class="small" x="740" y="724" text-anchor="middle">cache for product</text>

  <rect class="store shadow" x="880" y="638" rx="18" ry="18" width="220" height="110" />
  <text class="label" x="990" y="676" text-anchor="middle">Redis chat</text>
  <text class="small" x="990" y="702" text-anchor="middle">Notifications</text>
  <text class="small" x="990" y="724" text-anchor="middle">chat session</text>

  <rect class="external shadow" x="1130" y="638" rx="18" ry="18" width="240" height="110" />
  <text class="label" x="1250" y="676" text-anchor="middle">AWS DynamoDB</text>
  <text class="small" x="1250" y="702" text-anchor="middle">rooms / messages</text>
  <text class="small" x="1250" y="724" text-anchor="middle">notifications</text>

  <rect class="external shadow" x="1400" y="638" rx="18" ry="18" width="200" height="110" />
  <text class="label" x="1500" y="676" text-anchor="middle">AWS S3</text>
  <text class="small" x="1500" y="702" text-anchor="middle">images</text>
  <text class="small" x="1500" y="724" text-anchor="middle">uploads</text>

  <rect class="external shadow" x="300" y="794" rx="18" ry="18" width="190" height="88" />
  <text class="label" x="395" y="828" text-anchor="middle">SMTP Gmail</text>
  <text class="small" x="395" y="852" text-anchor="middle">OTP / order mail</text>

  <rect class="external shadow" x="520" y="794" rx="18" ry="18" width="190" height="88" />
  <text class="label" x="615" y="828" text-anchor="middle">Google AI</text>
  <text class="small" x="615" y="852" text-anchor="middle">Gemini</text>

  <rect class="external shadow" x="740" y="794" rx="18" ry="18" width="190" height="88" />
  <text class="label" x="835" y="828" text-anchor="middle">MoMo</text>
  <text class="small" x="835" y="852" text-anchor="middle">payment provider</text>

  <rect class="external shadow" x="960" y="794" rx="18" ry="18" width="300" height="88" />
  <text class="label" x="1110" y="828" text-anchor="middle">Gateway chat routes</text>
  <text class="small" x="1110" y="852" text-anchor="middle">/chat, /api/chat, /socket.io, /uploads</text>

  <rect class="external shadow" x="1300" y="794" rx="18" ry="18" width="250" height="88" />
  <text class="label" x="1425" y="828" text-anchor="middle">WebSocket client</text>
  <text class="small" x="1425" y="852" text-anchor="middle">Frontend ↔ Gateway</text>

  <path class="arrow" d="M214 220 L330 256" />
  <path class="arrow" d="M214 318 L330 256" />

  <path class="arrow" d="M580 266 L660 266" />
  <path class="arrow" d="M910 266 L1010 266" />
  <path class="arrow" d="M1220 266 L1260 266" />

  <path class="arrow" d="M455 312 L455 356" />
  <path class="arrow" d="M785 312 L785 356" />
  <path class="arrow" d="M1115 312 L1115 356" />
  <path class="arrow" d="M1365 312 L1365 356" />

  <path class="arrow" d="M455 448 L455 638" />
  <path class="arrow" d="M785 448 L445 638" />
  <path class="arrow" d="M785 448 L740 638" />
  <path class="arrow" d="M785 448 L1110 794" />
  <path class="arrow" d="M1115 448 L1110 794" />
  <path class="arrow" d="M1365 448 L1500 638" />

  <path class="arrow" d="M785 584 L990 638" />
  <path class="arrow" d="M785 584 L1250 638" />

  <path class="arrow" d="M1115 448 L395 794" />
  <path class="arrow" d="M1115 448 L615 794" />
  <path class="arrow" d="M1115 448 L835 794" />

  <path class="arrow" d="M785 266 L395 794" />
  <path class="arrow" d="M785 266 L615 794" />
  <path class="arrow" d="M785 266 L1110 794" />
  <path class="arrow" d="M785 266 L1425 794" />

  <path class="arrow dashed" d="M785 256 L1110 256" />
  <path class="arrow dashed" d="M785 256 L785 492" />

  <text class="tiny" x="330" y="972">Chat traffic also goes through API Gateway, not direct to chat-service.</text>
  <text class="tiny" x="330" y="992">Main flow: Client → Frontend → API Gateway → services; data layer sits below.</text>
</svg>