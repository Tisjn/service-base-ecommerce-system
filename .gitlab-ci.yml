stages:
  - validate
  - test
  - build
  - image
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  DOCKER_TLS_CERTDIR: ""
  MAVEN_CLI_OPTS: "-B -ntp"
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  NODE_ENV: "test"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .m2/repository/
    - frontend/node_modules/
    - services/api-gateway/node_modules/
    - services/auth-service/node_modules/
    - services/chat-service/node_modules/

.node_job:
  image: node:22-alpine
  before_script:
    - cd "$SERVICE_PATH"
    - npm ci --prefer-offline --no-audit --progress=false

.maven_job:
  image: maven:3.9-eclipse-temurin-21
  before_script:
    - cd "$SERVICE_PATH"

frontend:validate:
  extends: .node_job
  stage: validate
  variables:
    SERVICE_PATH: frontend
  script:
    - npm run check --if-present
    - npm run lint --if-present
  rules:
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml

frontend:build:
  extends: .node_job
  stage: build
  variables:
    SERVICE_PATH: frontend
  script:
    - npm run build
  artifacts:
    expire_in: 7 days
    paths:
      - frontend/dist/
  rules:
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml

node:validate:
  extends: .node_job
  stage: validate
  parallel:
    matrix:
      - SERVICE_NAME: api-gateway
        SERVICE_PATH: services/api-gateway
      - SERVICE_NAME: auth-service
        SERVICE_PATH: services/auth-service
      - SERVICE_NAME: chat-service
        SERVICE_PATH: services/chat-service
  script:
    - npm run check --if-present
    - npm test --if-present
  rules:
    - changes:
        - services/api-gateway/**/*
        - services/auth-service/**/*
        - services/chat-service/**/*
        - .gitlab-ci.yml

maven:test:
  extends: .maven_job
  stage: test
  parallel:
    matrix:
      - SERVICE_NAME: ai-service
        SERVICE_PATH: services/ai-service
      - SERVICE_NAME: order-service
        SERVICE_PATH: services/order-service
      - SERVICE_NAME: payment-service
        SERVICE_PATH: services/payment-service
      - SERVICE_NAME: product-service
        SERVICE_PATH: services/product-service
      - SERVICE_NAME: user-service
        SERVICE_PATH: services/user-service
  script:
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      junit:
        - "$SERVICE_PATH/target/surefire-reports/TEST-*.xml"
  rules:
    - changes:
        - services/ai-service/**/*
        - services/order-service/**/*
        - services/payment-service/**/*
        - services/product-service/**/*
        - services/user-service/**/*
        - .gitlab-ci.yml

maven:package:
  extends: .maven_job
  stage: build
  parallel:
    matrix:
      - SERVICE_NAME: ai-service
        SERVICE_PATH: services/ai-service
      - SERVICE_NAME: order-service
        SERVICE_PATH: services/order-service
      - SERVICE_NAME: payment-service
        SERVICE_PATH: services/payment-service
      - SERVICE_NAME: product-service
        SERVICE_PATH: services/product-service
      - SERVICE_NAME: user-service
        SERVICE_PATH: services/user-service
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests package
  artifacts:
    expire_in: 7 days
    paths:
      - "$SERVICE_PATH/target/*.jar"
  rules:
    - changes:
        - services/ai-service/**/*
        - services/order-service/**/*
        - services/payment-service/**/*
        - services/product-service/**/*
        - services/user-service/**/*
        - .gitlab-ci.yml

docker:build_push:
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  stage: image
  variables:
    DOCKER_HOST: tcp://docker:2375
  parallel:
    matrix:
      - SERVICE_NAME: api-gateway
        SERVICE_PATH: services/api-gateway
      - SERVICE_NAME: auth-service
        SERVICE_PATH: services/auth-service
      - SERVICE_NAME: chat-service
        SERVICE_PATH: services/chat-service
      - SERVICE_NAME: ai-service
        SERVICE_PATH: services/ai-service
      - SERVICE_NAME: order-service
        SERVICE_PATH: services/order-service
      - SERVICE_NAME: payment-service
        SERVICE_PATH: services/payment-service
      - SERVICE_NAME: product-service
        SERVICE_PATH: services/product-service
      - SERVICE_NAME: user-service
        SERVICE_PATH: services/user-service
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - IMAGE="$CI_REGISTRY_IMAGE/$SERVICE_NAME"
    - docker pull "$IMAGE:latest" || true
    - docker build --pull --cache-from "$IMAGE:latest" --tag "$IMAGE:$CI_COMMIT_SHORT_SHA" --tag "$IMAGE:$CI_COMMIT_REF_SLUG" "$SERVICE_PATH"
    - docker push "$IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMAGE:$CI_COMMIT_REF_SLUG"
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$IMAGE:$CI_COMMIT_SHORT_SHA" "$IMAGE:latest"
        docker push "$IMAGE:latest"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - services/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_TAG

deploy:staging:
  image: alpine:3.20
  stage: deploy
  before_script:
    - apk add --no-cache openssh-client
    - eval "$(ssh-agent -s)"
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && docker compose pull && docker compose up -d"
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
