spring:
  application:
    name: order-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${RDS_HOST:localhost}:${RDS_PORT:3306}/${RDS_DB:orderdb}?useSSL=${RDS_SSL:false}&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:${RDS_USER:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${RDS_PASSWORD:password}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:1}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:30000}
      initialization-fail-timeout: ${SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT:-1}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
        boot:
          allow_jdbc_metadata_access: ${SPRING_JPA_ALLOW_JDBC_METADATA_ACCESS:true}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 60000
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}
  mail:
    host: ${SPRING_MAIL_HOST:${SMTP_HOST:}}
    port: ${SPRING_MAIL_PORT:${SMTP_PORT:587}}
    username: ${SPRING_MAIL_USERNAME:${SMTP_USER:}}
    password: ${SPRING_MAIL_PASSWORD:${SMTP_PASS:}}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

product:
  service:
    url: ${PRODUCT_SERVICE_URL:http://localhost:3003}
payment:
  service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:3005}
service:
  http:
    connect-timeout-ms: ${SERVICE_HTTP_CONNECT_TIMEOUT_MS:1000}
    read-timeout-ms: ${SERVICE_HTTP_READ_TIMEOUT_MS:15000}
notification:
  email:
    from: ${NOTIFICATION_EMAIL_FROM:${SPRING_MAIL_USERNAME:${SMTP_USER:no-reply@dtpshop.local}}}
    subject-prefix: ${NOTIFICATION_EMAIL_SUBJECT_PREFIX:[DTPShop]}

management:
  health:
    db:
      enabled: ${MANAGEMENT_HEALTH_DB_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${SERVER_PORT:3004}
