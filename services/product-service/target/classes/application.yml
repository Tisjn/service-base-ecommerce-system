spring:
  application:
    name: product-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${RDS_HOST:localhost}:${RDS_PORT:3306}/${RDS_DB:ecommerce_data}?useSSL=${RDS_SSL:false}&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:${RDS_USER:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${RDS_PASSWORD:password}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:2}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:30000}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:${SPRING_REDIS_HOST:localhost}}
      port: ${SPRING_DATA_REDIS_PORT:${SPRING_REDIS_PORT:6379}}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:1000ms}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

product:
  outbox:
    publisher-delay-ms: ${PRODUCT_OUTBOX_PUBLISHER_DELAY_MS:3000}
  cache:
    warmup-enabled: ${PRODUCT_CACHE_WARMUP_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${SERVER_PORT:3003}
