version: "3.8"

services:
  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth-service:
    build: .
    container_name: auth-service
    ports:
      - "3001:3001"
    depends_on:
      redis-cache:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-0a8e7a473e35d1080204701f57ba0cb86641689c11998b16662f96be329c2ac3}
      - DB_HOST=database-1-instance-1.cvwyy4mmuaiw.ap-southeast-1.rds.amazonaws.com
      - DB_PORT=3306
      - DB_NAME=ecommerce_data
      - DB_USER=admin
      - DB_PASSWORD=Tinle091104
      - DB_SSL=false
      - REDIS_HOST=redis-cache
      - REDIS_PORT=6379
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_SECURE=false
      - SMTP_USER=lehuuphuc6573@gmail.com
      - SMTP_PASS=tajpyxzkgyytcrkh
      - OTP_TTL_SECONDS=300
      - OTP_MAX_ATTEMPTS=3
    restart: unless-stopped

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge
