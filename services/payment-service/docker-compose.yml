services:
  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-service
    env_file:
      - .env
    ports:
      - "3005:3005"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://${RDS_HOST:-${DB_HOST}}:${RDS_PORT:-${DB_PORT:-3306}}/${RDS_DB:-${DB_NAME:-ecommerce_data}}?useSSL=${RDS_SSL:-${DB_SSL:-false}}&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${RDS_USER:-${DB_USER}}
      - SPRING_DATASOURCE_PASSWORD=${RDS_PASSWORD:-${DB_PASSWORD}}
      - SERVER_PORT=3005
      - MOMO_ENDPOINT=${MOMO_ENDPOINT:-https://test-payment.momo.vn/v2/gateway/api/create}
      - MOMO_PARTNER_CODE=${MOMO_PARTNER_CODE:-MOMO}
      - MOMO_ACCESS_KEY=${MOMO_ACCESS_KEY}
      - MOMO_SECRET_KEY=${MOMO_SECRET_KEY}
      - MOMO_REDIRECT_URL=${MOMO_REDIRECT_URL:-http://localhost:3005/payments/return/momo}
      - MOMO_IPN_URL=${MOMO_IPN_URL:-http://localhost:3005/payments/webhook/momo}
      - MOMO_FRONTEND_RETURN_URL=${MOMO_FRONTEND_RETURN_URL:-http://localhost:5173/customer/orders}
    networks:
      - app-network
    restart: on-failure

networks:
  app-network:
    driver: bridge
