services:
  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "3005:3005"
    environment:
      - RDS_HOST=${RDS_HOST}
      - RDS_PORT=${RDS_PORT:-3306}
      - RDS_DB=${RDS_DB:-ecommerce_data}
      - RDS_USER=${RDS_USER}
      - RDS_PASSWORD=${RDS_PASSWORD}
      - RDS_SSL=${RDS_SSL:-false}
      - SERVER_PORT=3005
      - MOMO_ENDPOINT=${MOMO_ENDPOINT:-https://test-payment.momo.vn/v2/gateway/api/create}
      - MOMO_PARTNER_CODE=${MOMO_PARTNER_CODE:-MOMO}
      - MOMO_ACCESS_KEY=${MOMO_ACCESS_KEY}
      - MOMO_SECRET_KEY=${MOMO_SECRET_KEY}
      - MOMO_REDIRECT_URL=${MOMO_REDIRECT_URL:-http://localhost:3005/payments/return/momo}
      - MOMO_IPN_URL=${MOMO_IPN_URL:-http://localhost:3005/payments/webhook/momo}
      - MOMO_FRONTEND_RETURN_URL=${MOMO_FRONTEND_RETURN_URL:-http://localhost:5173/customer/orders}
      - MOMO_REQUEST_TYPE=${MOMO_REQUEST_TYPE:-payWithMethod}
      - MOMO_PARTNER_NAME=${MOMO_PARTNER_NAME:-Test}
      - MOMO_STORE_ID=${MOMO_STORE_ID:-MomoTestStore}
      - MOMO_LANG=${MOMO_LANG:-vi}
    networks:
      - app-network
    restart: on-failure

networks:
  app-network:
    driver: bridge
