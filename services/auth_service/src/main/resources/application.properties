# Database connection. Use environment variables to override in different environments.
# - To use the AWS RDS instance set DB_HOST to the RDS hostname (or leave DB_HOST unset and use the default below).
# - For local development set DB_HOST=localhost and run a local MySQL (or use a container).
# Example (PowerShell): $env:DB_HOST = 'localhost'; mvn spring-boot:run
spring.datasource.url=jdbc:mysql://${DB_HOST:database-1.cvwyy4mmuaiw.ap-southeast-1.rds.amazonaws.com}:${DB_PORT:3306}/${DB_NAME:ecommerce_data}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASSWORD:sapassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Hibernate DDL auto mode (override with SPRING_JPA_DDL if needed):
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL:update}
spring.jpa.show-sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
