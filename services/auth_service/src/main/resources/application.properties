# Load local .env file as property source when present.
spring.config.import=optional:file:.env[.properties],optional:file:services/auth_service/.env[.properties]

# Database connection from environment variables (required).
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Hibernate DDL auto mode from environment variable (required).
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL}
spring.jpa.show-sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
