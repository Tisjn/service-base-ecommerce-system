services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "${API_GATEWAY_HOST_PORT:-8081}:8080"
    env_file:
      - .env
    environment:
      - PORT=8080

      # This compose file runs only the gateway. The downstream services can
      # run on the host machine or from their own compose files with ports
      # published to localhost.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
