services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "${API_GATEWAY_HOST_PORT:-8081}:8080"
    environment:
      - PORT=8080
      - FRONTEND_URL=http://localhost:5173
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173

      # This compose file runs only the gateway. The downstream services can
      # run on the host machine or from their own compose files with ports
      # published to localhost.
      - AUTH_SERVICE_URL=http://host.docker.internal:3001
      - USER_SERVICE_URL=http://host.docker.internal:3002
      - PRODUCT_SERVICE_URL=http://host.docker.internal:3003
      - ORDER_SERVICE_URL=http://host.docker.internal:3004
      - PAYMENT_SERVICE_URL=http://host.docker.internal:3005
      - CHAT_SERVICE_URL=http://host.docker.internal:3008

      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX=100
      - AUTH_VERIFY_TIMEOUT_MS=5000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
