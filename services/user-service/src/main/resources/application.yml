spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${RDS_HOST:localhost}:${RDS_PORT:3306}/${RDS_DB:userdb}?useSSL=${RDS_SSL:false}&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:${RDS_USER:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${RDS_PASSWORD:password}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

order:
  service:
    url: ${ORDER_SERVICE_URL:http://localhost:3004}

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${SERVER_PORT:${PORT:3002}}
